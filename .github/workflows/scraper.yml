name: Job Scraper (Proxy + Chromedp)

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run Tests
        run: go test ./...

      - name: Build Scraper
        run: go build -o ./bin/scraper ./cmd/scraper/

      - name: Run Scraper
        env:
          PROXY_URLS: ${{ secrets.PROXY_URLS }}
          PROXY_STRATEGY: "round-robin"
          ENV: "production"
          CHROME_PATH: ""
        run: ./bin/scraper

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet metadata.json || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and Push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add jobs.db metadata.json data/jobs.json output/
          git commit -m "Update job database [skip ci]"
          git push

      - name: Upload Output Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-output
          path: output/
          retention-days: 7
          if-no-files-found: ignore

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Scraper Failed: check logs',
              body: 'The scraper workflow failed. Please check the Action logs for details. It might be an IP block or selector change.'
            })
